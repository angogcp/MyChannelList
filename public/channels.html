<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watch List — Video DL</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 520px;
      }

      /* ── Channel sidebar ── */
      .ch-sidebar {
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow: hidden;
        border-right: 1px solid var(--border);
      }
      .sidebar-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sidebar-head strong { color: var(--text-main); font-weight: 600; font-size: 0.95rem; }
      .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }

      .ch-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        cursor: pointer;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        color: var(--text-muted);
        transition: all 0.15s;
        margin-bottom: 2px;
      }
      .ch-item:hover { background: var(--bg-panel-hover); color: var(--text-main); }
      .ch-item.active { background: rgba(138,43,226,0.12); color: #c084fc; }
      .ch-item .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .ch-remove {
        opacity: 0; background: none; border: none; color: var(--error);
        cursor: pointer; font-size: 1.1rem; padding: 0 4px; line-height: 1;
      }
      .ch-item:hover .ch-remove { opacity: 0.6; }
      .ch-remove:hover { opacity: 1 !important; }

      /* ── Feed panel ── */
      .feed-panel { display: flex; flex-direction: column; padding: 0; overflow: hidden; }
      .feed-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .feed-title { font-size: 1rem; font-weight: 600; color: var(--text-main); }
      .feed-actions { display: flex; gap: 8px; align-items: center; }
      .mode-pick select { padding: 7px 10px; font-size: 0.85rem; border-radius: var(--radius-sm); }

      .feed-body { flex: 1; overflow-y: auto; max-height: calc(100vh - 340px); }
      .feed-empty {
        display: grid; place-items: center; min-height: 280px;
        color: var(--text-muted); font-size: 0.95rem; padding: 32px; text-align: center;
      }

      .vid-row {
        display: grid;
        grid-template-columns: auto 100px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      .vid-row:hover { background: var(--bg-panel-hover); }
      .vid-thumb {
        width: 100px; height: 56px; object-fit: cover;
        border-radius: 6px; background: var(--bg-surface);
      }
      .vid-info { overflow: hidden; }
      .vid-title {
        font-size: 0.9rem; font-weight: 600; color: var(--text-main);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .vid-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
      .vid-open {
        font-size: 0.8rem; color: var(--text-muted); text-decoration: none;
        padding: 4px 10px; border: 1px solid var(--border); border-radius: 99px;
        transition: all 0.15s;
      }
      .vid-open:hover { color: var(--text-main); border-color: rgba(255,255,255,0.2); }

      .select-all-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 20px; border-bottom: 1px solid var(--border);
        font-size: 0.85rem; color: var(--text-muted);
      }

      /* ── Drive bar (compact) ── */
      .drive-bar {
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }
      .drive-bar-toggle {
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; color: var(--text-muted); user-select: none;
      }
      .drive-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
      .drive-dot.on { background: var(--success); box-shadow: 0 0 6px var(--success); }
      .drive-chevron { margin-left: auto; transition: transform 0.2s; }
      .drive-chevron.open { transform: rotate(180deg); }
      .drive-bar-body { display: none; padding-top: 12px; }
      .drive-bar-body.open { display: block; }
      .drive-row {
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px;
      }
      .drive-row:last-child { margin-bottom: 0; }
      .drive-link { color: var(--accent-primary); text-decoration: none; font-size: 0.85rem; }
      .drive-link:hover { text-decoration: underline; }

      /* ── Status ── */
      .bottom-status {
        padding: 14px 20px;
        font-size: 0.85rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
      }
      .bottom-status .success { color: var(--success); }
      .bottom-status .error { color: var(--error); }

      /* ── Queue ── */
      .queue-item {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 8px;
      }
      .queue-head {
        display: flex; justify-content: space-between; align-items: flex-start;
      }
      .queue-title {
        font-size: 0.9rem; font-weight: 600; color: var(--text-main);
        word-break: break-all;
      }
      .queue-status-badge {
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        padding: 2px 6px; border-radius: 4px;
        background: rgba(255,255,255,0.1); color: var(--text-muted);
        white-space: nowrap; margin-left: 12px;
      }
      .queue-status-badge.processing { background: rgba(138,43,226,0.2); color: #c084fc; }
      .queue-status-badge.uploading { background: rgba(65,105,225,0.2); color: #82a5ff; }
      .queue-status-badge.done { background: rgba(16,185,129,0.2); color: #34d399; }
      .queue-status-badge.error { background: rgba(239,68,68,0.2); color: #f87171; }
      
      .queue-msg {
        font-size: 0.82rem; color: var(--text-muted); white-space: pre-wrap;
      }
      .queue-track {
        height: 6px; background: rgba(0,0,0,0.3); border-radius: 99px; overflow: hidden;
      }
      .queue-fill {
        height: 100%; background: var(--gradient-btn); width: 0%;
        transition: width 0.3s linear;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .ch-sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
        .vid-row { grid-template-columns: auto 1fr auto; }
        .vid-thumb { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <nav class="sidebar-nav">
        <div class="brand">
          <div class="brand-title">Video DL</div>
          <div class="brand-version">v1.2.0</div>
        </div>
        <div class="nav-menu">
          <a href="/" class="nav-item"><i data-feather="download"></i> Downloader</a>
          <a href="/channels.html" class="nav-item active"><i data-feather="list"></i> Watch List</a>
          <a href="/library.html" class="nav-item"><i data-feather="hard-drive"></i> Library</a>
        </div>
      </nav>

      <main class="main-content" style="max-width:100%">
        <div class="content-wrapper" style="max-width:1100px">
          <header class="page-header">
            <h1>Watch List</h1>
            <p class="sub">Track channels and batch download their latest videos.</p>
          </header>

          <div class="glass-panel">
            <div class="layout">
              <aside class="ch-sidebar">
                <div class="sidebar-head">
                  <strong>Channels</strong>
                  <button class="secondary small" id="add-channel-btn">+ Add</button>
                </div>
                <div class="sidebar-list" id="channel-list"></div>
              </aside>

              <section class="feed-panel">
                <div class="feed-head">
                  <span class="feed-title" id="feed-title">Select a channel</span>
                  <div class="feed-actions">
                    <div class="mode-pick">
                      <select id="dl-mode">
                        <option value="video">Video</option>
                        <option value="mp3">MP3</option>
                      </select>
                    </div>
                    <div class="mode-pick">
                      <select id="dl-quality"></select>
                    </div>
                    <button class="secondary small" id="refresh-btn" disabled>Refresh</button>
                    <button class="primary small" id="download-btn" disabled>Download selected</button>
                  </div>
                </div>

                <!-- Compact drive bar -->
                <div class="drive-bar" id="drive-bar">
                  <div class="drive-bar-toggle" id="drive-toggle">
                    <span class="drive-dot" id="drive-indicator"></span>
                    <span id="drive-label">Google Drive</span>
                    <span class="drive-chevron" id="drive-chevron"><i data-feather="chevron-down" style="width:14px;height:14px"></i></span>
                  </div>
                  <div class="drive-bar-body" id="drive-body">
                    <div class="drive-row" id="drive-not-connected" style="display:none">
                      <span>Not connected.</span>
                      <a href="/" class="drive-link">Set up on Downloader page →</a>
                    </div>
                    <div id="drive-connected-controls" style="display:none">
                      <div class="drive-row">
                        <select id="drive-folder" style="min-width:160px"><option value="">Loading...</option></select>
                        <button class="secondary small" id="drive-reload-btn" type="button">↻</button>
                        <button class="secondary small" id="drive-new-folder-btn" type="button">+ New</button>
                      </div>
                      <div class="drive-row">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-muted);cursor:pointer">
                          <input type="checkbox" id="drive-upload" /> Upload to Drive
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-muted);cursor:pointer">
                          <input type="checkbox" id="drive-delete-local" /> Delete local
                        </label>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="select-all-row" id="select-all-row" style="display:none">
                  <input type="checkbox" id="select-all" />
                  <label for="select-all">Select all</label>
                </div>

                <div class="feed-body" id="feed-body">
                  <div class="feed-empty" id="feed-empty">Pick a channel to see its latest videos.</div>
                </div>
              </section>
            </div>

            <div style="border-top: 1px solid var(--border); padding: 16px 20px;">
              <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 12px;">
                <strong style="color: var(--text-main); font-size: 0.95rem;">Download Queue</strong>
                <button class="secondary small" id="clear-queue-btn" type="button">Clear finished</button>
              </div>
              <div id="queue-list" style="max-height: 200px; overflow-y: auto; padding-right: 4px;">
                <div style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 10px;">No active downloads.</div>
              </div>
            </div>
            
            <div class="bottom-status" id="status-bar">Ready.</div>
          </div>
        </div>
      </main>
    </div>

    <script>feather.replace();</script>

    <script>
      const channelListEl = document.getElementById("channel-list");
      const feedTitleEl = document.getElementById("feed-title");
      const feedBodyEl = document.getElementById("feed-body");
      const feedEmptyEl = document.getElementById("feed-empty");
      const queueList = document.getElementById("queue-list");
      const clearQueueBtn = document.getElementById("clear-queue-btn");
      const statusBar = document.getElementById("status-bar");
      const refreshBtn = document.getElementById("refresh-btn");
      const downloadBtn = document.getElementById("download-btn");
      const addChannelBtn = document.getElementById("add-channel-btn");
      const selectAllRow = document.getElementById("select-all-row");
      const selectAllCb = document.getElementById("select-all");
      const dlModeSelect = document.getElementById("dl-mode");
      const dlQualitySelect = document.getElementById("dl-quality");

      const driveToggle = document.getElementById("drive-toggle");
      const driveChevron = document.getElementById("drive-chevron");
      const driveBody = document.getElementById("drive-body");
      const driveIndicator = document.getElementById("drive-indicator");
      const driveLabel = document.getElementById("drive-label");
      const driveNotConnected = document.getElementById("drive-not-connected");
      const driveConnectedControls = document.getElementById("drive-connected-controls");
      const driveFolderSelect = document.getElementById("drive-folder");
      const driveReloadBtn = document.getElementById("drive-reload-btn");
      const driveNewFolderBtn = document.getElementById("drive-new-folder-btn");
      const driveUploadCb = document.getElementById("drive-upload");
      const driveDeleteLocalCb = document.getElementById("drive-delete-local");

      const QUALITY_KEY = "video-dl.web.channels.quality";
      const DISMISSED_QUEUE_KEY = "video-dl.web.queue.dismissed";

      const DRIVE_KEYS = {
        folderId: "video-dl.web.drive.folderId",
        upload: "video-dl.web.drive.upload",
        deleteLocal: "video-dl.web.drive.deleteLocal"
      };

      let channelsList = [];
      let activeChannel = null;
      let videos = [];
      let busy = false;
      const selectedVideos = new Map();
      const dismissedQueueIds = new Set();
      let driveConnected = false;

      boot();

      async function boot() {
        addChannelBtn.addEventListener("click", addChannel);
        refreshBtn.addEventListener("click", () => loadVideos(activeChannel));
        downloadBtn.addEventListener("click", downloadSelected);
        clearQueueBtn.addEventListener("click", clearFinishedQueue);
        dlModeSelect.addEventListener("change", () => renderQualityOptions());
        dlQualitySelect.addEventListener("change", () => storeVal(QUALITY_KEY, dlQualitySelect.value));
        selectAllCb.addEventListener("change", toggleSelectAll);

        driveToggle.addEventListener("click", () => {
          driveBody.classList.toggle("open");
          driveChevron.classList.toggle("open");
        });
        driveReloadBtn.addEventListener("click", () => loadDriveFolders());
        driveNewFolderBtn.addEventListener("click", createDriveFolder);
        driveUploadCb.addEventListener("change", () => {
          storeVal(DRIVE_KEYS.upload, driveUploadCb.checked ? "1" : "0");
          syncDriveToggles();
        });
        driveDeleteLocalCb.addEventListener("change", () => {
          storeVal(DRIVE_KEYS.deleteLocal, driveDeleteLocalCb.checked ? "1" : "0");
        });
        driveFolderSelect.addEventListener("change", () => {
          storeVal(DRIVE_KEYS.folderId, driveFolderSelect.value);
          syncDriveToggles();
        });

        renderQualityOptions(loadVal(QUALITY_KEY, ""));
        initQueueStream();
        await Promise.all([loadChannels(), initDrive()]);
      }

      function initQueueStream() {
        const source = new EventSource("/api/queue/stream");
        source.onmessage = (event) => {
          try {
            renderQueue(JSON.parse(event.data));
          } catch (err) {}
        };
      }

      function renderQueue(jobs) {
        const visibleJobs = (jobs || []).filter((job) => !dismissedQueueIds.has(job.id));
        if (!visibleJobs.length) {
          queueList.innerHTML = `<div style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 10px;">No active downloads.</div>`;
          return;
        }
        
        queueList.innerHTML = "";
        for (const job of visibleJobs) {
          const div = document.createElement("div");
          div.className = "queue-item";
          
          let trackHtml = "";
          if (job.status === "processing" || job.status === "uploading") {
            trackHtml = `
              <div class="queue-track">
                <div class="queue-fill" style="width: ${job.percent}%"></div>
              </div>
            `;
          }

          let linkHtml = "";
          if (job.driveLink) {
            linkHtml = ` <a href="${job.driveLink}" target="_blank" style="color:var(--accent-primary)">View in Drive</a>`;
          }

          div.innerHTML = `
            <div class="queue-head">
              <div class="queue-title" title="${esc(job.title)}">${esc(job.title)}</div>
              <div class="queue-status-badge ${job.status}">${job.status}</div>
            </div>
            <div class="queue-msg">${esc(job.message)}${linkHtml}</div>
            ${trackHtml}
          `;
          queueList.appendChild(div);
        }
      }

      function getQualityOptions(mode) {
        return mode === "mp3"
          ? [
              { value: "best", label: "Best MP3" },
              { value: "320k", label: "320 kbps" },
              { value: "192k", label: "192 kbps" },
              { value: "128k", label: "128 kbps" }
            ]
          : [
              { value: "best", label: "Best MP4" },
              { value: "2160p", label: "4K / 2160p" },
              { value: "1440p", label: "1440p" },
              { value: "1080p", label: "1080p" },
              { value: "720p", label: "720p" },
              { value: "480p", label: "480p" }
            ];
      }

      function renderQualityOptions(preferredValue = "") {
        const options = getQualityOptions(dlModeSelect.value);
        const nextValue = options.some((option) => option.value === preferredValue)
          ? preferredValue
          : options[0].value;

        dlQualitySelect.innerHTML = "";
        for (const option of options) {
          const el = document.createElement("option");
          el.value = option.value;
          el.textContent = option.label;
          dlQualitySelect.appendChild(el);
        }

        dlQualitySelect.value = nextValue;
        storeVal(QUALITY_KEY, nextValue);
      }
      async function clearFinishedQueue() {
        clearQueueBtn.disabled = true;
        try {
          const cards = Array.from(queueList.querySelectorAll(".queue-item"));
          let cleared = 0;
          for (const card of cards) {
            const badge = card.querySelector(".queue-status-badge");
            const title = card.querySelector(".queue-title");
            const status = badge ? String(badge.textContent || "").trim().toLowerCase() : "";
            const key = title ? String(title.textContent || "").trim() : "";
            if ((status === "done" || status === "error") && key) {
              dismissedQueueIds.add(key);
              cleared += 1;
            }
          }
          saveDismissedQueueIds();
          if (cleared > 0) {
            cards.forEach((card) => {
              const badge = card.querySelector(".queue-status-badge");
              const status = badge ? String(badge.textContent || "").trim().toLowerCase() : "";
              if (status === "done" || status === "error") {
                card.remove();
              }
            });
            if (!queueList.querySelector(".queue-item")) {
              queueList.innerHTML = `<div style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 10px;">No active downloads.</div>`;
            }
          }
          try {
            await api("/api/queue/clear", { method: "POST" });
          } catch {}
          setStatus("success", cleared > 0 ? `Cleared ${cleared} finished queue item${cleared !== 1 ? "s" : ""}.` : "No finished queue items to clear.");
        } catch (err) {
          setStatus("error", err.message);
        } finally {
          clearQueueBtn.disabled = false;
        }
      }

      function loadDismissedQueueIds() {
        try {
          const raw = loadVal(DISMISSED_QUEUE_KEY, "[]");
          const items = JSON.parse(raw);
          if (Array.isArray(items)) {
            for (const item of items) {
              if (item) dismissedQueueIds.add(String(item));
            }
          }
        } catch {}
      }

      function saveDismissedQueueIds() {
        storeVal(DISMISSED_QUEUE_KEY, JSON.stringify(Array.from(dismissedQueueIds)));
      }
      async function loadChannels() {
        try {
          const data = await api("/api/channels");
          channelsList = data.channels || [];
          renderChannels();
        } catch (err) { setStatus("error", err.message); }
      }

      function renderChannels() {
        channelListEl.innerHTML = "";
        for (const ch of channelsList) {
          const div = document.createElement("div");
          div.className = "ch-item" + (activeChannel && activeChannel.url === ch.url ? " active" : "");
          div.innerHTML = `<span class="ch-name">${esc(ch.name)}</span><button class="ch-remove" title="Remove">&times;</button>`;
          div.querySelector(".ch-name").addEventListener("click", () => selectChannel(ch));
          div.querySelector(".ch-remove").addEventListener("click", (e) => { e.stopPropagation(); removeChannel(ch); });
          channelListEl.appendChild(div);
        }
      }

      function selectChannel(ch) {
        activeChannel = ch;
        renderChannels();
        refreshBtn.disabled = false;
        loadVideos(ch);
      }

      async function addChannel() {
        const url = prompt("YouTube channel URL:");
        if (!url || !url.trim()) return;
        const name = prompt("Display name (optional):", "");
        try {
          const data = await api("/api/channels", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: url.trim(), name: (name || "").trim() })
          });
          channelsList = data.channels || [];
          renderChannels();
          setStatus("success", `Added "${data.channel.name}".`);
        } catch (err) { setStatus("error", err.message); }
      }

      async function removeChannel(ch) {
        if (!confirm(`Remove "${ch.name}"?`)) return;
        try {
          const data = await api("/api/channels", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: ch.url })
          });
          channelsList = data.channels || [];
          if (activeChannel && activeChannel.url === ch.url) {
            activeChannel = null; videos = []; renderFeed();
            feedTitleEl.textContent = "Select a channel";
            refreshBtn.disabled = true;
          }
          renderChannels();
          setStatus("success", `Removed "${ch.name}".`);
        } catch (err) { setStatus("error", err.message); }
      }

      async function loadVideos(ch) {
        if (!ch || busy) return;
        busy = true;
        feedTitleEl.textContent = ch.name;
        feedBodyEl.innerHTML = `<div class="feed-empty"><span class="spinner"></span> Loading...</div>`;
        selectAllRow.style.display = "none";
        downloadBtn.disabled = true;
        refreshBtn.disabled = true;
        setStatus("", `Loading videos from ${ch.name}...`);
        try {
          const data = await api(`/api/channels/videos?url=${encodeURIComponent(ch.url)}&limit=15`);
          videos = data.videos || [];
          renderFeed();
          setStatus("success", `${videos.length} video${videos.length !== 1 ? "s" : ""} loaded.`);
        } catch (err) {
          feedBodyEl.innerHTML = `<div class="feed-empty" style="color:var(--error)">Failed: ${esc(err.message)}</div>`;
          videos = [];
          setStatus("error", err.message);
        } finally { busy = false; refreshBtn.disabled = false; }
      }

      function renderFeed() {
        feedBodyEl.innerHTML = "";
        selectAllCb.checked = false;
        if (!videos.length) {
          feedBodyEl.innerHTML = `<div class="feed-empty">No videos found.</div>`;
          selectAllRow.style.display = "none";
          syncDownloadBtn();
          return;
        }
        selectAllRow.style.display = "flex";
        for (let i = 0; i < videos.length; i++) {
          const v = videos[i];
          const row = document.createElement("div");
          row.className = "vid-row";
          const dateStr = v.uploadDate ? `${v.uploadDate.slice(0,4)}-${v.uploadDate.slice(4,6)}-${v.uploadDate.slice(6,8)}` : "";
          const durStr = v.duration ? fmtDur(v.duration) : "";
          const meta = [dateStr, durStr].filter(Boolean).join(" · ");
          const sel = selectedVideos.has(v.url);
          row.innerHTML = `
            <input type="checkbox" class="vid-cb" data-idx="${i}" ${sel?"checked":""} />
            <img class="vid-thumb" src="${v.thumbnail||""}" alt="" loading="lazy" onerror="this.style.visibility='hidden'" />
            <div class="vid-info">
              <div class="vid-title" title="${esc(v.title)}">${esc(v.title)}</div>
              <div class="vid-meta">${esc(meta)}</div>
            </div>
            <a class="vid-open" href="${v.url}" target="_blank" rel="noopener">Open ↗</a>
          `;
          row.querySelector(".vid-cb").addEventListener("change", (e) => {
            if (e.target.checked) selectedVideos.set(v.url, v);
            else selectedVideos.delete(v.url);
            syncDownloadBtn();
          });
          feedBodyEl.appendChild(row);
        }
        syncDownloadBtn();
      }

      function toggleSelectAll() {
        const checked = selectAllCb.checked;
        feedBodyEl.querySelectorAll(".vid-cb").forEach(cb => {
          cb.checked = checked;
          const v = videos[Number(cb.dataset.idx)];
          if (v) { if (checked) selectedVideos.set(v.url, v); else selectedVideos.delete(v.url); }
        });
        syncDownloadBtn();
      }

      function syncDownloadBtn() {
        downloadBtn.disabled = selectedVideos.size === 0;
        downloadBtn.textContent = selectedVideos.size > 0 ? `Download (${selectedVideos.size})` : "Download selected";
        const cbs = feedBodyEl.querySelectorAll(".vid-cb");
        selectAllCb.checked = cbs.length > 0 && [...cbs].every(cb => cb.checked);
      }

      async function downloadSelected() {
        const selected = [...selectedVideos.values()];
        if (!selected.length) return;
        const uploadToDrive = driveUploadCb.checked && driveConnected;
        const driveFolderId = driveFolderSelect.value;
        const deleteLocalAfterUpload = driveDeleteLocalCb.checked;
        if (uploadToDrive && !driveFolderId) { alert("Choose a Drive folder first."); return; }

        busy = true; downloadBtn.disabled = true; refreshBtn.disabled = true;
        const mode = dlModeSelect.value;
        
        for (const v of selected) {
          try {
            await api("/api/download", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: v.url, mode, quality: dlQualitySelect.value, uploadToDrive, driveFolderId, deleteLocalAfterUpload, title: v.title })
            });
          } catch (err) {
            console.error("Failed to add job:", err);
          }
        }

        busy = false; refreshBtn.disabled = false;
        selectedVideos.clear();
        renderFeed();
      }

      async function initDrive() {
        try {
          const status = await api("/api/drive/status");
          driveConnected = !!status.connected;
          if (driveConnected) {
            driveIndicator.classList.add("on");
            driveLabel.textContent = status.email ? `Drive · ${status.email}` : "Drive · Connected";
            driveNotConnected.style.display = "none";
            driveConnectedControls.style.display = "block";
            driveUploadCb.checked = loadVal(DRIVE_KEYS.upload, "0") === "1";
            driveDeleteLocalCb.checked = loadVal(DRIVE_KEYS.deleteLocal, "0") === "1";
            await loadDriveFolders();
            syncDriveToggles();
          } else {
            driveLabel.textContent = "Drive · Not connected";
            driveNotConnected.style.display = "flex";
            driveConnectedControls.style.display = "none";
          }
        } catch {
          driveLabel.textContent = "Drive · unavailable";
          driveNotConnected.style.display = "flex";
          driveConnectedControls.style.display = "none";
        }
      }

      async function loadDriveFolders() {
        if (!driveConnected) return;
        try {
          const data = await api("/api/drive/folders");
          const folders = Array.isArray(data.folders) ? data.folders : [];
          const savedId = loadVal(DRIVE_KEYS.folderId, "");
          driveFolderSelect.innerHTML = "";
          const ph = document.createElement("option"); ph.value = ""; ph.textContent = folders.length ? "Choose folder" : "No folders";
          driveFolderSelect.appendChild(ph);
          for (const f of folders) { const o = document.createElement("option"); o.value = f.id; o.textContent = f.name; driveFolderSelect.appendChild(o); }
          if (savedId && folders.some(f => f.id === savedId)) driveFolderSelect.value = savedId;
          else if (folders.some(f => f.id === "root")) { driveFolderSelect.value = "root"; storeVal(DRIVE_KEYS.folderId, "root"); }
          syncDriveToggles();
        } catch (err) { setStatus("error", "Drive: " + err.message); }
      }

      async function createDriveFolder() {
        const name = prompt("Folder name:");
        if (!name || !name.trim()) return;
        try {
          const r = await api("/api/drive/folders", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: name.trim() }) });
          await loadDriveFolders();
          driveFolderSelect.value = r.id;
          storeVal(DRIVE_KEYS.folderId, r.id);
          syncDriveToggles();
        } catch (err) { setStatus("error", err.message); }
      }

      function syncDriveToggles() {
        const hasFolder = !!driveFolderSelect.value;
        driveUploadCb.disabled = !driveConnected || !hasFolder;
        driveDeleteLocalCb.disabled = !driveUploadCb.checked || driveUploadCb.disabled;
        if ((!driveConnected || !hasFolder) && driveUploadCb.checked) { driveUploadCb.checked = false; storeVal(DRIVE_KEYS.upload, "0"); }
      }

      function loadVal(k, fb) { try { return localStorage.getItem(k) ?? fb; } catch { return fb; } }
      function storeVal(k, v) { try { localStorage.setItem(k, v); } catch {} }

      function setStatus(type, msg) {
        if (!statusBar) return;
        statusBar.innerHTML = type ? `<span class="${type}">${esc(msg)}</span>` : esc(msg);
      }

      function fmtDur(s) {
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        return h > 0 ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${m}:${String(sec).padStart(2,"0")}`;
      }

      function esc(v) {
        return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      }

      async function api(url, opts = {}) {
        const r = await fetch(url, opts);
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || "Request failed.");
        return d;
      }
    </script>
  </body>
</html>
