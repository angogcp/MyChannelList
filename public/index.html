<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video DL</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
      form.glass-panel {
        padding: 32px;
        display: grid;
        gap: 24px;
        margin-bottom: 24px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      /* ── Collapsible Drive Section ── */
      .drive-toggle {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 0 0;
        cursor: pointer;
        user-select: none;
        border-top: 1px solid var(--border);
      }
      .drive-toggle .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
      }
      .drive-toggle .dot.on {
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
      }
      .drive-toggle span {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-muted);
      }
      .drive-toggle .arrow {
        margin-left: auto;
        color: var(--text-muted);
        transition: transform 0.2s;
      }
      .drive-toggle .arrow.open { transform: rotate(180deg); }

      .drive-body {
        display: none;
        padding-top: 20px;
        display: grid;
        gap: 16px;
      }
      .drive-body.collapsed { display: none; }
      .drive-body.expanded { display: grid; }

      .drive-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .drive-folder-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .drive-folder-row select { flex: 1; }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.9rem;
        color: var(--text-muted);
        cursor: pointer;
      }
      .toggle-row input { flex-shrink: 0; }

      .hint {
        font-size: 0.82rem;
        color: var(--text-muted);
        font-style: italic;
      }

      /* ── Queue ── */
      .queue-item {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 8px;
      }
      .queue-head {
        display: flex; justify-content: space-between; align-items: flex-start;
      }
      .queue-title {
        font-size: 0.9rem; font-weight: 600; color: var(--text-main);
        word-break: break-all;
      }
      .queue-status-badge {
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        padding: 2px 6px; border-radius: 4px;
        background: rgba(255,255,255,0.1); color: var(--text-muted);
        white-space: nowrap; margin-left: 12px;
      }
      .queue-status-badge.processing { background: rgba(245,158,11,0.16); color: #fde68a; }
      .queue-status-badge.uploading { background: rgba(20,184,166,0.16); color: #99f6e4; }
      .queue-status-badge.done { background: rgba(16,185,129,0.2); color: #34d399; }
      .queue-status-badge.error { background: rgba(239,68,68,0.2); color: #f87171; }
      
      .queue-msg {
        font-size: 0.82rem; color: var(--text-muted); white-space: pre-wrap;
      }
      .queue-track {
        height: 6px; background: rgba(0,0,0,0.3); border-radius: 99px; overflow: hidden;
      }
      .queue-fill {
        height: 100%; background: var(--gradient-btn); width: 0%;
        transition: width 0.3s linear;
      }

      @media (max-width: 768px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <nav class="sidebar-nav">
        <div class="brand">
          <div class="brand-title">Video DL</div>
          <div class="brand-version">v1.0.23</div>
        </div>
        <div class="nav-menu">
          <a href="/" class="nav-item active"><i data-feather="download"></i> Downloader</a>
          <a href="/channels.html" class="nav-item"><i data-feather="list"></i> Inbox</a>
          <a href="/analysis.html" class="nav-item"><i data-feather="sparkles"></i> Analysis</a>
          <a href="/library.html" class="nav-item"><i data-feather="hard-drive"></i> Library</a>
        </div>
      </nav>

      <main class="main-content">
        <div class="content-wrapper">
          <header class="page-header">
            <h1>Download a video</h1>
            <p class="sub">Paste a URL, pick a format, and hit download.</p>
          </header>

          <form id="download-form" class="glass-panel">
            <label>
              <span class="label-text">Video URL</span>
              <input id="url" name="url" type="url" placeholder="https://youtube.com/watch?v=..." required />
            </label>

            <div class="row">
              <label>
                <span class="label-text">Format</span>
                <select id="mode" name="mode">
                  <option value="video">Video (MP4)</option>
                  <option value="mp3">Audio (MP3)</option>
                </select>
              </label>
              <label>
                <span class="label-text">Custom filename</span>
                <input id="customName" name="customName" type="text" placeholder="Optional" />
              </label>
            </div>

            <label>
              <span class="label-text">Quality</span>
              <select id="quality" name="quality"></select>
            </label>

            <!-- Collapsible Google Drive -->
            <div class="drive-toggle" id="drive-toggle">
              <span class="dot" id="drive-dot"></span>
              <span id="drive-toggle-label">Google Drive</span>
              <span class="arrow" id="drive-arrow"><i data-feather="chevron-down" style="width:16px;height:16px"></i></span>
            </div>

            <div class="drive-body collapsed" id="drive-body">
              <label>
                <span class="label-text">OAuth Client ID</span>
                <input id="driveClientId" type="text" placeholder="Google OAuth Desktop client ID" />
              </label>
              <label>
                <span class="label-text">OAuth Client Secret</span>
                <input id="driveClientSecret" type="text" placeholder="Google OAuth Client Secret" />
              </label>

              <div class="drive-actions">
                <button class="primary small" id="drive-connect" type="button">Connect</button>
                <button class="secondary small" id="drive-refresh" type="button">Reload Folders</button>
                <button class="danger small" id="drive-disconnect" type="button">Disconnect</button>
              </div>

              <div class="drive-folder-row">
                <select id="driveFolder"><option value="">Choose folder</option></select>
                <button type="button" id="drive-create-folder" class="secondary small" disabled>+ New</button>
              </div>

              <label class="toggle-row">
                <input id="uploadToDrive" type="checkbox" />
                Upload to Drive after download
              </label>
              <label class="toggle-row">
                <input id="deleteLocalAfterUpload" type="checkbox" />
                Delete local file after upload
              </label>

              <div id="drive-note" class="hint">Paste your client ID &amp; secret, then connect.</div>
            </div>

            <button class="primary" id="submit" type="submit" style="padding: 14px;">
              <i data-feather="download-cloud"></i> Download
            </button>
          </form>

          <section class="glass-panel" style="padding: 24px;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
              <strong style="color: var(--text-main);">Download Queue</strong>
              <div style="display:flex; gap:8px; align-items:center;">
                <button class="secondary small" id="clear-queue-btn" type="button">Clear finished</button>
                <button class="secondary small" id="update-engine" type="button"><i data-feather="refresh-cw" style="width:14px;height:14px"></i> Update Engine</button>
              </div>
            </div>
            <div id="queue-list" style="max-height: 400px; overflow-y: auto; padding-right: 4px;">
              <div style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 20px;">No active downloads.</div>
            </div>
            <div id="page-status" style="margin-top: 16px; font-size: 0.85rem; color: var(--text-muted);">Ready.</div>
          </section>
        </div>
      </main>
    </div>

    <script>feather.replace();</script>

    <script>
      const form = document.getElementById("download-form");
      const submit = document.getElementById("submit");
      const queueList = document.getElementById("queue-list");
      const pageStatus = document.getElementById("page-status");
      const clearQueueBtn = document.getElementById("clear-queue-btn");
      const updateEngineBtn = document.getElementById("update-engine");
      const modeSelect = document.getElementById("mode");
      const qualitySelect = document.getElementById("quality");
      const driveClientIdInput = document.getElementById("driveClientId");
      const driveClientSecretInput = document.getElementById("driveClientSecret");
      const driveFolderSelect = document.getElementById("driveFolder");
      const driveConnectButton = document.getElementById("drive-connect");
      const driveRefreshButton = document.getElementById("drive-refresh");
      const driveCreateFolderButton = document.getElementById("drive-create-folder");
      const driveDisconnectButton = document.getElementById("drive-disconnect");
      const uploadToDriveInput = document.getElementById("uploadToDrive");
      const deleteLocalAfterUploadInput = document.getElementById("deleteLocalAfterUpload");
      const driveNote = document.getElementById("drive-note");
      const driveDot = document.getElementById("drive-dot");
      const driveToggleLabel = document.getElementById("drive-toggle-label");
      const driveToggle = document.getElementById("drive-toggle");
      const driveArrow = document.getElementById("drive-arrow");
      const driveBody = document.getElementById("drive-body");

      const STORAGE_KEYS = {
        clientId: "video-dl.web.drive.clientId",
        clientSecret: "video-dl.web.drive.clientSecret",
        folderId: "video-dl.web.drive.folderId",
        upload: "video-dl.web.drive.upload",
        deleteLocal: "video-dl.web.drive.deleteLocal",
        quality: "video-dl.web.quality"
      };
      const DEFAULT_GOOGLE_CLIENT_ID = "";
      const DEFAULT_GOOGLE_CLIENT_SECRET = "";

      let driveConnected = false;
      let driveBusy = false;

      boot();
      bindEvents();

      async function boot() {
        loadPreferences();
        renderQualityOptions(loadValue(STORAGE_KEYS.quality, ""));
        await refreshDriveStatus(true);
        initQueueStream();
      }

      function initQueueStream() {
        const source = new EventSource("/api/queue/stream");
        source.onmessage = (event) => {
          try {
            const jobs = JSON.parse(event.data);
            renderQueue(jobs);
          } catch (err) {}
        };
      }

      function renderQueue(jobs) {
        if (!jobs || jobs.length === 0) {
          queueList.innerHTML = `<div style="text-align:center; color: var(--text-muted); font-size: 0.85rem; padding: 20px;">No active downloads.</div>`;
          return;
        }
        
        queueList.innerHTML = "";
        for (const job of jobs) {
          const div = document.createElement("div");
          div.className = "queue-item";
          
          let trackHtml = "";
          if (job.status === "processing" || job.status === "uploading") {
            trackHtml = `
              <div class="queue-track">
                <div class="queue-fill" style="width: ${job.percent}%"></div>
              </div>
            `;
          }

          let linkHtml = "";
          if (job.driveLink) {
            linkHtml = ` <a href="${job.driveLink}" target="_blank" style="color:var(--accent-primary)">View in Drive</a>`;
          }

          div.innerHTML = `
            <div class="queue-head">
              <div class="queue-title">${esc(job.title)}</div>
              <div class="queue-status-badge ${job.status}">${job.status}</div>
            </div>
            <div class="queue-msg">${esc(job.message)}${linkHtml}</div>
            ${trackHtml}
          `;
          queueList.appendChild(div);
        }
      }

      async function clearFinishedQueue() {
        try {
          const response = await fetch("/api/queue/clear", { method: "POST" });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.error || "Failed to clear finished queue items.");
          }

          renderQueue(payload.queue || []);
          setStatus("Finished queue items cleared.", "success");
        } catch (error) {
          setStatus(error.message || "Failed to clear finished queue items.", "error");
        }
      }

      function esc(str) {
        return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      function bindEvents() {
        driveToggle.addEventListener("click", () => {
          driveBody.classList.toggle("collapsed");
          driveBody.classList.toggle("expanded");
          driveArrow.classList.toggle("open");
        });

        modeSelect.addEventListener("change", () => {
          renderQualityOptions();
        });

        qualitySelect.addEventListener("change", () => {
          storeValue(STORAGE_KEYS.quality, qualitySelect.value);
        });

        driveClientIdInput.addEventListener("input", () => {
          storeValue(STORAGE_KEYS.clientId, driveClientIdInput.value.trim());
          syncDriveUiState();
        });
        driveClientSecretInput.addEventListener("input", () => {
          storeValue(STORAGE_KEYS.clientSecret, driveClientSecretInput.value.trim());
          syncDriveUiState();
        });
        driveFolderSelect.addEventListener("change", () => {
          storeValue(STORAGE_KEYS.folderId, driveFolderSelect.value);
          syncDriveUiState();
        });
        uploadToDriveInput.addEventListener("change", () => {
          storeValue(STORAGE_KEYS.upload, uploadToDriveInput.checked ? "1" : "0");
          syncDriveUiState();
        });
        deleteLocalAfterUploadInput.addEventListener("change", () => {
          storeValue(STORAGE_KEYS.deleteLocal, deleteLocalAfterUploadInput.checked ? "1" : "0");
        });

        driveConnectButton.addEventListener("click", connectDrive);
        driveRefreshButton.addEventListener("click", () => loadDriveFolders(true));
        driveCreateFolderButton.addEventListener("click", createDriveFolder);
        driveDisconnectButton.addEventListener("click", disconnectDrive);
        form.addEventListener("submit", handleSubmit);
        clearQueueBtn.addEventListener("click", clearFinishedQueue);
        updateEngineBtn.addEventListener("click", updateYtDlpEngine);
      }

      async function handleSubmit(event) {
        event.preventDefault();
        const uploadToDrive = uploadToDriveInput.checked;
        const driveFolderId = driveFolderSelect.value;
        const deleteLocalAfterUpload = deleteLocalAfterUploadInput.checked;

        if (uploadToDrive && !driveConnected) {
          alert("Connect Google Drive before enabling upload.");
          return;
        }
        if (uploadToDrive && !driveFolderId) {
          alert("Choose a Google Drive folder before enabling upload.");
          return;
        }

        submit.disabled = true;
        const payload = {
          url: document.getElementById("url").value.trim(),
          mode: document.getElementById("mode").value,
          customName: document.getElementById("customName").value.trim(),
          quality: qualitySelect.value,
          uploadToDrive,
          driveFolderId,
          deleteLocalAfterUpload
        };

        try {
          await api("/api/download", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          document.getElementById("url").value = "";
          document.getElementById("customName").value = "";
        } catch (error) {
          alert("Failed to add job: " + error.message);
        } finally {
          submit.disabled = false;
        }
      }

      async function updateYtDlpEngine() {
        updateEngineBtn.disabled = true;
        updateEngineBtn.innerHTML = `<span class="spinner" style="width:14px;height:14px;border-width:2px;margin-right:6px"></span> Updating...`;
        try {
          const res = await api("/api/system/update-engine", { method: "POST" });
          alert("Update complete:\\n" + res.log);
        } catch (err) {
          alert("Update failed: " + err.message);
        } finally {
          updateEngineBtn.disabled = false;
          updateEngineBtn.innerHTML = `<i data-feather="refresh-cw" style="width:14px;height:14px"></i> Update Engine`;
          feather.replace();
        }
      }

      async function connectDrive() {
        const clientId = driveClientIdInput.value.trim();
        const clientSecret = driveClientSecretInput.value.trim();
        if (!clientId || !clientSecret) {
          driveNote.textContent = "Paste client ID and secret first.";
          return;
        }
        setDriveBusy(true);
        driveNote.textContent = "Opening Google sign-in...";
        storeValue(STORAGE_KEYS.clientId, clientId);
        storeValue(STORAGE_KEYS.clientSecret, clientSecret);
        try {
          const result = await api("/api/drive/connect-init", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId, clientSecret })
          });
          window.location.assign(result.authUrl);
        } catch (error) {
          driveNote.textContent = error.message || "Failed to start Google sign-in.";
          setDriveBusy(false);
        }
      }

      async function disconnectDrive() {
        setDriveBusy(true);
        try {
          await api("/api/drive/disconnect", { method: "POST" });
          driveConnected = false;
          populateFolders([], "");
          syncDriveUiState();
        } catch (error) {
          driveNote.textContent = error.message;
        } finally {
          setDriveBusy(false);
        }
      }

      async function refreshDriveStatus(loadFolders) {
        try {
          const status = await api("/api/drive/status");
          driveConnected = !!status.connected;
          if (!driveClientIdInput.value.trim() && status.clientId) {
             driveClientIdInput.value = status.clientId;
             storeValue(STORAGE_KEYS.clientId, status.clientId);
          }
          if (!driveClientSecretInput.value.trim() && status.clientSecret) {
             driveClientSecretInput.value = status.clientSecret;
             storeValue(STORAGE_KEYS.clientSecret, status.clientSecret);
          }
          syncDriveUiState(status.email || "");
          if (driveConnected && loadFolders) {
            await loadDriveFolders(false);
          }
        } catch (error) {
          driveNote.textContent = error.message;
        }
      }

      async function loadDriveFolders(showLoading) {
        if (!driveConnected) { populateFolders([], ""); syncDriveUiState(); return; }
        if (showLoading) driveNote.textContent = "Loading folders...";
        setDriveBusy(true);
        try {
          const result = await api("/api/drive/folders");
          populateFolders(Array.isArray(result.folders) ? result.folders : [], loadValue(STORAGE_KEYS.folderId, ""));
        } catch (error) {
          driveNote.textContent = error.message;
        } finally {
          setDriveBusy(false);
        }
      }

      async function createDriveFolder() {
        if (!driveConnected) return;
        const name = window.prompt("New folder name:");
        if (!name || !name.trim()) return;
        setDriveBusy(true);
        try {
          const result = await api("/api/drive/folders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name.trim() })
          });
          await loadDriveFolders(false);
          driveFolderSelect.value = result.id;
          storeValue(STORAGE_KEYS.folderId, result.id);
          syncDriveUiState();
        } catch (error) {
          driveNote.textContent = error.message;
        } finally {
          setDriveBusy(false);
        }
      }

      function populateFolders(folders, selectedId) {
        driveFolderSelect.innerHTML = "";
        const ph = document.createElement("option");
        ph.value = "";
        ph.textContent = folders.length ? "Choose folder" : "No folders";
        driveFolderSelect.appendChild(ph);
        for (const f of folders) {
          const o = document.createElement("option");
          o.value = f.id;
          o.textContent = f.name;
          driveFolderSelect.appendChild(o);
        }
        if (selectedId && folders.some(f => f.id === selectedId)) {
          driveFolderSelect.value = selectedId;
        } else if (folders.some(f => f.id === "root")) {
          driveFolderSelect.value = "root";
          storeValue(STORAGE_KEYS.folderId, "root");
        } else {
          driveFolderSelect.value = "";
          storeValue(STORAGE_KEYS.folderId, "");
        }
        syncDriveUiState();
      }

      function syncDriveUiState(email = "") {
        const hasCredentials = !!driveClientIdInput.value.trim() && !!driveClientSecretInput.value.trim();
        const hasFolder = !!driveFolderSelect.value;

        // Toggle label
        if (driveConnected) {
          driveDot.classList.add("on");
          driveToggleLabel.textContent = email ? `Google Drive - ${email}` : "Google Drive - Connected";
        } else {
          driveDot.classList.remove("on");
          driveToggleLabel.textContent = "Google Drive - Not connected";
        }

        driveConnectButton.disabled = driveBusy || !hasCredentials;
        driveRefreshButton.disabled = driveBusy || !driveConnected;
        driveCreateFolderButton.disabled = driveBusy || !driveConnected;
        driveDisconnectButton.disabled = driveBusy || !driveConnected;
        uploadToDriveInput.disabled = !driveConnected || !hasFolder;
        deleteLocalAfterUploadInput.disabled = !uploadToDriveInput.checked || uploadToDriveInput.disabled;

        if ((!driveConnected || !hasFolder) && uploadToDriveInput.checked) {
          uploadToDriveInput.checked = false;
          storeValue(STORAGE_KEYS.upload, "0");
        }

        if (!driveBusy) {
          if (!hasCredentials) driveNote.textContent = "Paste client ID & secret, then connect.";
          else if (!driveConnected) driveNote.textContent = "Click Connect to sign in with Google.";
          else if (!hasFolder) driveNote.textContent = "Choose a folder or create a new one.";
          else if (!uploadToDriveInput.checked) driveNote.textContent = "Enable upload to send downloads to Drive.";
          else driveNote.textContent = deleteLocalAfterUploadInput.checked
            ? "Downloads will upload to Drive, then local file removed."
            : "Downloads will upload to Drive after saving locally.";
        }
      }

      function getQualityOptions(mode) {
        return mode === "mp3"
          ? [
              { value: "best", label: "Best available MP3" },
              { value: "320k", label: "320 kbps" },
              { value: "192k", label: "192 kbps" },
              { value: "128k", label: "128 kbps" }
            ]
          : [
              { value: "best", label: "Best available MP4" },
              { value: "2160p", label: "4K / 2160p" },
              { value: "1440p", label: "1440p" },
              { value: "1080p", label: "1080p" },
              { value: "720p", label: "720p" },
              { value: "480p", label: "480p" }
            ];
      }

      function renderQualityOptions(preferredValue = "") {
        const options = getQualityOptions(modeSelect.value);
        const nextValue = options.some((option) => option.value === preferredValue)
          ? preferredValue
          : options[0].value;

        qualitySelect.innerHTML = "";
        for (const option of options) {
          const el = document.createElement("option");
          el.value = option.value;
          el.textContent = option.label;
          qualitySelect.appendChild(el);
        }

        qualitySelect.value = nextValue;
        storeValue(STORAGE_KEYS.quality, nextValue);
      }
      function loadPreferences() {
        driveClientIdInput.value = loadValue(STORAGE_KEYS.clientId, DEFAULT_GOOGLE_CLIENT_ID);
        driveClientSecretInput.value = loadValue(STORAGE_KEYS.clientSecret, DEFAULT_GOOGLE_CLIENT_SECRET);
        uploadToDriveInput.checked = loadValue(STORAGE_KEYS.upload, "0") === "1";
        deleteLocalAfterUploadInput.checked = loadValue(STORAGE_KEYS.deleteLocal, "0") === "1";
        syncDriveUiState();
      }

      function loadValue(k, fb) { try { return localStorage.getItem(k) ?? fb; } catch { return fb; } }
      function storeValue(k, v) { try { localStorage.setItem(k, v); } catch {} }
      function setStatus(message, type = "") {
        if (!pageStatus) return;
        pageStatus.textContent = message;
        pageStatus.style.color = type === "error"
          ? "var(--error)"
          : type === "success"
            ? "var(--success)"
            : "var(--text-muted)";
      }

      async function api(url, opts = {}) {
        const r = await fetch(url, opts);
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || "Request failed.");
        return d;
      }

      function renderDownloadDetails(data, driveUpload, del) {
        if (driveUpload) {
          const lines = [del ? "Local file removed." : `Saved: ${data.filePath}`];
          lines.push(`Drive: ${driveUpload.name}`);
          if (driveUpload.webViewLink) lines.push(driveUpload.webViewLink);
          lines.push("", data.log || "Done.");
          return lines.join("\n");
        }
        return data.filePath ? `Saved: ${data.filePath}\n\n${data.log}` : data.log || "Done.";
      }

      function setDriveBusy(b) { driveBusy = !!b; syncDriveUiState(); }
    </script>
  </body>
</html>
