<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library — Video DL</title>
    <style>
      :root {
        --bg: #f2efe8;
        --panel: rgba(255, 252, 245, 0.9);
        --ink: #1e1d1a;
        --muted: #666156;
        --accent: #c24d2c;
        --accent-dark: #8f351d;
        --line: rgba(30, 29, 26, 0.12);
        --success: #226c4c;
        --error: #9f2d2d;
        --hover-bg: rgba(194, 77, 44, 0.07);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 77, 44, 0.25), transparent 32%),
          radial-gradient(circle at bottom right, rgba(34, 108, 76, 0.18), transparent 35%),
          linear-gradient(135deg, #efe9dd, #f8f5ee 45%, #ece5d8);
        display: grid;
        place-items: start center;
        padding: 24px;
      }

      .shell {
        width: min(1000px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(52, 37, 24, 0.12);
        overflow: hidden;
        backdrop-filter: blur(14px);
      }

      /* ── Header ── */
      .header {
        padding: 28px 32px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .header-left { display: flex; flex-direction: column; gap: 4px; }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 12px;
        color: var(--accent-dark);
      }

      h1 { font-size: clamp(1.6rem, 4vw, 2.6rem); line-height: 1; }

      .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }

      .nav-link {
        font-size: 0.88rem;
        color: var(--accent);
        text-decoration: none;
        border: 1px solid var(--line);
        padding: 7px 14px;
        border-radius: 999px;
        transition: background 120ms;
        white-space: nowrap;
      }
      .nav-link:hover { background: var(--hover-bg); }

      /* ── Stats bar ── */
      .stats-bar {
        display: flex;
        gap: 24px;
        padding: 14px 32px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.45);
        font-size: 0.88rem;
        color: var(--muted);
        flex-wrap: wrap;
        align-items: center;
      }

      .stat { display: flex; align-items: center; gap: 6px; }
      .stat-value { font-weight: 700; color: var(--ink); }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        gap: 10px;
        padding: 14px 32px;
        border-bottom: 1px solid var(--line);
        align-items: center;
        flex-wrap: wrap;
      }

      .filter-group { display: flex; gap: 4px; }

      .filter-btn {
        font: inherit;
        font-size: 0.82rem;
        padding: 5px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        cursor: pointer;
        transition: all 120ms;
      }
      .filter-btn:hover { background: var(--hover-bg); color: var(--ink); }
      .filter-btn.active {
        background: linear-gradient(135deg, var(--accent), #db7345);
        color: #fff8f0;
        border-color: transparent;
        font-weight: 700;
      }

      .toolbar-spacer { flex: 1; }

      .search-box {
        font: inherit;
        font-size: 0.85rem;
        padding: 6px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
        width: 200px;
      }

      /* ── Buttons ── */
      button {
        font: inherit;
        border: 0;
        border-radius: 999px;
        padding: 8px 16px;
        background: linear-gradient(135deg, var(--accent), #db7345);
        color: #fff8f0;
        font-weight: 700;
        font-size: 0.84rem;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
        box-shadow: 0 6px 14px rgba(194, 77, 44, 0.2);
      }
      button:hover:not(:disabled) { transform: translateY(-1px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      .secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink);
        border: 1px solid var(--line);
        box-shadow: none;
      }

      .danger-btn {
        background: var(--error);
        box-shadow: 0 4px 10px rgba(159, 45, 45, 0.2);
        font-size: 0.78rem;
        padding: 5px 12px;
      }

      .small-btn {
        padding: 5px 12px;
        font-size: 0.82rem;
      }

      /* ── File list ── */
      .file-list {
        max-height: 600px;
        overflow-y: auto;
      }

      .file-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 16px;
        align-items: center;
        padding: 14px 32px;
        border-bottom: 1px solid var(--line);
        transition: background 100ms;
      }
      .file-row:hover { background: var(--hover-bg); }

      .file-info { overflow: hidden; }

      .file-name {
        font-size: 0.92rem;
        font-weight: 600;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-meta {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 3px;
        display: flex;
        gap: 10px;
      }

      .file-badge {
        display: inline-block;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .file-badge.video { background: rgba(194, 77, 44, 0.12); color: var(--accent-dark); }
      .file-badge.audio { background: rgba(34, 108, 76, 0.12); color: var(--success); }

      .file-size {
        font-size: 0.84rem;
        color: var(--muted);
        white-space: nowrap;
        text-align: right;
        min-width: 70px;
      }

      .file-empty {
        display: grid;
        place-items: center;
        min-height: 250px;
        color: var(--muted);
        font-size: 1.05rem;
        padding: 32px;
        text-align: center;
      }

      /* ── Status bar ── */
      .status-bar {
        padding: 14px 32px;
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
        font-size: 0.88rem;
        color: var(--muted);
        min-height: 48px;
      }
      .status-bar .success { color: var(--success); }
      .status-bar .error { color: var(--error); }

      /* ── Loading ── */
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid var(--line);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Select all row ── */
      .select-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 32px;
        background: rgba(255, 255, 255, 0.4);
        border-bottom: 1px solid var(--line);
        font-size: 0.85rem;
        color: var(--muted);
      }
      .select-row input[type="checkbox"] {
        width: 16px; height: 16px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .file-row input[type="checkbox"] {
        width: 16px; height: 16px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .file-row-with-cb {
        grid-template-columns: auto 1fr auto auto auto;
      }

      @media (max-width: 640px) {
        .header, .stats-bar, .toolbar, .file-row, .select-row { padding-left: 18px; padding-right: 18px; }
        .file-row { grid-template-columns: auto 1fr auto; }
        .file-badge, .file-size { display: none; }
        .search-box { width: 140px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">

      <div class="header">
        <div class="header-left">
          <span class="eyebrow">Local Storage</span>
          <h1>My Library</h1>
        </div>
        <div class="nav-links">
          <a href="/" class="nav-link">← Downloader</a>
          <a href="/channels.html" class="nav-link">Watch List</a>
        </div>
      </div>

      <div class="stats-bar" id="stats-bar">
        <div class="stat"><span>Files:</span> <span class="stat-value" id="stat-total">—</span></div>
        <div class="stat"><span>Videos:</span> <span class="stat-value" id="stat-video">—</span></div>
        <div class="stat"><span>Audio:</span> <span class="stat-value" id="stat-audio">—</span></div>
        <div class="stat"><span>Total size:</span> <span class="stat-value" id="stat-size">—</span></div>
      </div>

      <div class="toolbar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="video">Video</button>
          <button class="filter-btn" data-filter="audio">Audio</button>
        </div>
        <div class="toolbar-spacer"></div>
        <input type="text" class="search-box" id="search" placeholder="Search files..." />
        <button class="secondary small-btn" id="refresh-btn">Refresh</button>
        <button class="danger-btn" id="delete-selected-btn" disabled>Delete selected</button>
      </div>

      <div class="select-row" id="select-row" style="display: none;">
        <input type="checkbox" id="select-all" />
        <label for="select-all">Select all</label>
        <span id="selected-count" style="margin-left: auto;"></span>
      </div>

      <div class="file-list" id="file-list">
        <div class="file-empty"><span class="spinner"></span>Loading files...</div>
      </div>

      <div class="status-bar" id="status-bar">Ready.</div>

    </main>

    <script>
      const fileListEl = document.getElementById("file-list");
      const statusBar = document.getElementById("status-bar");
      const refreshBtn = document.getElementById("refresh-btn");
      const deleteSelectedBtn = document.getElementById("delete-selected-btn");
      const selectRow = document.getElementById("select-row");
      const selectAllCb = document.getElementById("select-all");
      const selectedCountEl = document.getElementById("selected-count");
      const searchInput = document.getElementById("search");
      const statTotal = document.getElementById("stat-total");
      const statVideo = document.getElementById("stat-video");
      const statAudio = document.getElementById("stat-audio");
      const statSize = document.getElementById("stat-size");

      let allFiles = [];
      let activeFilter = "all";
      let busy = false;

      boot();

      async function boot() {
        refreshBtn.addEventListener("click", loadLibrary);
        deleteSelectedBtn.addEventListener("click", deleteSelected);
        selectAllCb.addEventListener("change", toggleSelectAll);
        searchInput.addEventListener("input", renderFiles);

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            activeFilter = btn.dataset.filter;
            renderFiles();
          });
        });

        await loadLibrary();
      }

      async function loadLibrary() {
        if (busy) return;
        busy = true;
        fileListEl.innerHTML = `<div class="file-empty"><span class="spinner"></span>Loading files...</div>`;
        selectRow.style.display = "none";

        try {
          const data = await api("/api/library");
          allFiles = data.files || [];
          updateStats();
          renderFiles();
          setStatus("success", `Loaded ${allFiles.length} file${allFiles.length !== 1 ? "s" : ""}.`);
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty" style="color: var(--error)">${esc(err.message)}</div>`;
          setStatus("error", err.message);
        } finally {
          busy = false;
        }
      }

      function getFiltered() {
        const query = searchInput.value.trim().toLowerCase();
        return allFiles.filter((f) => {
          if (activeFilter !== "all" && f.category !== activeFilter) return false;
          if (query && !f.name.toLowerCase().includes(query)) return false;
          return true;
        });
      }

      function renderFiles() {
        const files = getFiltered();
        fileListEl.innerHTML = "";
        selectAllCb.checked = false;
        deleteSelectedBtn.disabled = true;
        selectedCountEl.textContent = "";

        if (!files.length) {
          const msg = allFiles.length
            ? "No files match your filter."
            : "No downloaded files yet. Go download something!";
          fileListEl.innerHTML = `<div class="file-empty">${msg}</div>`;
          selectRow.style.display = "none";
          return;
        }

        selectRow.style.display = "flex";

        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          const row = document.createElement("div");
          row.className = "file-row file-row-with-cb";

          const dateStr = formatDate(f.modified);
          const ext = f.name.split(".").pop().toUpperCase();

          row.innerHTML = `
            <input type="checkbox" class="file-cb" data-path="${esc(f.path)}" />
            <div class="file-info">
              <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
              <div class="file-meta">
                <span>${dateStr}</span>
                <span>${ext}</span>
              </div>
            </div>
            <span class="file-badge ${f.category}">${f.category}</span>
            <span class="file-size">${f.size}</span>
            <button class="danger-btn file-del" data-path="${esc(f.path)}" data-name="${esc(f.name)}">Delete</button>
          `;

          row.querySelector(".file-cb").addEventListener("change", syncSelection);
          row.querySelector(".file-del").addEventListener("click", () => deleteSingle(f));
          fileListEl.appendChild(row);
        }
      }

      function toggleSelectAll() {
        const checked = selectAllCb.checked;
        fileListEl.querySelectorAll(".file-cb").forEach((cb) => { cb.checked = checked; });
        syncSelection();
      }

      function syncSelection() {
        const checkboxes = fileListEl.querySelectorAll(".file-cb");
        const checkedBoxes = fileListEl.querySelectorAll(".file-cb:checked");
        deleteSelectedBtn.disabled = checkedBoxes.length === 0;
        selectAllCb.checked = checkboxes.length > 0 && checkedBoxes.length === checkboxes.length;
        selectedCountEl.textContent = checkedBoxes.length ? `${checkedBoxes.length} selected` : "";
      }

      async function deleteSingle(f) {
        if (!confirm(`Delete "${f.name}"?`)) return;
        try {
          await api("/api/library", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: f.path })
          });
          allFiles = allFiles.filter((x) => x.path !== f.path);
          updateStats();
          renderFiles();
          setStatus("success", `Deleted "${f.name}".`);
        } catch (err) {
          setStatus("error", err.message);
        }
      }

      async function deleteSelected() {
        const paths = [...fileListEl.querySelectorAll(".file-cb:checked")].map((cb) => cb.dataset.path);
        if (!paths.length) return;
        if (!confirm(`Delete ${paths.length} file${paths.length > 1 ? "s" : ""}?`)) return;

        busy = true;
        deleteSelectedBtn.disabled = true;
        let deleted = 0;
        let lastError = "";

        for (const p of paths) {
          try {
            await api("/api/library", {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ path: p })
            });
            allFiles = allFiles.filter((x) => x.path !== p);
            deleted++;
          } catch (err) {
            lastError = err.message;
          }
        }

        updateStats();
        renderFiles();
        busy = false;

        if (lastError) {
          setStatus("error", `Deleted ${deleted}/${paths.length}. Error: ${lastError}`);
        } else {
          setStatus("success", `Deleted ${deleted} file${deleted > 1 ? "s" : ""}.`);
        }
      }

      function updateStats() {
        const videoFiles = allFiles.filter((f) => f.category === "video");
        const audioFiles = allFiles.filter((f) => f.category === "audio");
        const totalBytes = allFiles.reduce((s, f) => s + f.sizeBytes, 0);

        statTotal.textContent = allFiles.length;
        statVideo.textContent = videoFiles.length;
        statAudio.textContent = audioFiles.length;
        statSize.textContent = formatSizeJS(totalBytes);
      }

      // ── Helpers ──

      function setStatus(type, msg) {
        statusBar.innerHTML = type
          ? `<span class="${type}">${esc(msg)}</span>`
          : esc(msg);
      }

      function formatDate(isoStr) {
        try {
          const d = new Date(isoStr);
          return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }) +
            " " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
        } catch {
          return "";
        }
      }

      function formatSizeJS(bytes) {
        if (bytes === 0) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + " " + units[i];
      }

      function esc(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function api(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed.");
        return data;
      }
    </script>
  </body>
</html>
