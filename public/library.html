<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library - Video DL</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
      .stats-row {
        display: flex;
        gap: 32px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
        color: var(--text-muted);
        flex-wrap: wrap;
      }
      .stat { display: flex; align-items: center; gap: 6px; }
      .stat-value { font-weight: 700; color: var(--text-main); }

      .toolbar {
        display: flex;
        gap: 12px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }

      .filter-group {
        display: flex; gap: 4px;
        background: rgba(0,0,0,0.2); padding: 3px; border-radius: 99px;
      }
      .filter-btn {
        font: inherit; font-size: 0.82rem; font-weight: 500;
        padding: 5px 14px; border-radius: 99px; border: none;
        background: transparent; color: var(--text-muted); cursor: pointer;
        transition: all 0.15s;
      }
      .filter-btn:hover { color: var(--text-main); }
      .filter-btn.active {
        background: var(--bg-surface); color: var(--text-main);
        box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }

      .toolbar-spacer { flex: 1; }

      .search-box {
        font: inherit; font-size: 0.85rem;
        padding: 7px 14px;
        border: 1px solid var(--border); border-radius: 99px;
        background: var(--bg-surface); color: var(--text-main);
        width: 200px; outline: none; transition: border-color 0.2s;
      }
      .search-box:focus { border-color: var(--border-focus); }

      .file-list { max-height: calc(100vh - 380px); overflow-y: auto; }

      .file-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 16px; align-items: center;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      .file-row:hover { background: var(--bg-panel-hover); }

      .file-info { overflow: hidden; }
      .file-name {
        font-size: 0.9rem; font-weight: 600; color: var(--text-main);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .file-meta {
        font-size: 0.8rem; color: var(--text-muted); margin-top: 3px;
        display: flex; gap: 10px;
      }

      .file-badge {
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; padding: 3px 8px; border-radius: 4px;
        white-space: nowrap;
      }
      .file-badge.video { background: rgba(138,43,226,0.12); color: #c084fc; }
      .file-badge.audio { background: rgba(16,185,129,0.12); color: #34d399; }

      .file-size {
        font-size: 0.82rem; color: var(--text-muted);
        white-space: nowrap; text-align: right; min-width: 60px;
      }
      .file-empty {
        display: grid; place-items: center; min-height: 200px;
        color: var(--text-muted); font-size: 0.95rem; padding: 32px; text-align: center;
      }

      .select-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 24px; border-bottom: 1px solid var(--border);
        font-size: 0.85rem; color: var(--text-muted);
      }

      .file-row-with-cb { grid-template-columns: auto 1fr auto auto auto; }

      .bottom-status {
        padding: 14px 24px;
        font-size: 0.85rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
      }
      .bottom-status .success { color: var(--success); }
      .bottom-status .error { color: var(--error); }

      @media (max-width: 768px) {
        .stats-row, .toolbar, .file-row, .select-row { padding-left: 16px; padding-right: 16px; }
        .file-row { grid-template-columns: auto 1fr auto; }
        .file-badge, .file-size { display: none; }
        .search-box { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <nav class="sidebar-nav">
        <div class="brand">
          <div class="brand-title">Video DL</div>
          <div class="brand-version">v1.0.21</div>
        </div>
        <div class="nav-menu">
          <a href="/" class="nav-item"><i data-feather="download"></i> Downloader</a>
          <a href="/channels.html" class="nav-item"><i data-feather="list"></i> Inbox</a>
          <a href="/analysis.html" class="nav-item"><i data-feather="sparkles"></i> Analysis</a>
          <a href="/library.html" class="nav-item active"><i data-feather="hard-drive"></i> Library</a>
        </div>
      </nav>

      <main class="main-content" style="max-width:100%">
        <div class="content-wrapper" style="max-width:1000px">
          <header class="page-header">
            <h1>Library</h1>
            <p class="sub">Downloaded files on disk.</p>
          </header>

          <div class="glass-panel" style="display:flex;flex-direction:column">
            <div class="stats-row" id="stats-bar">
              <div class="stat">Files: <span class="stat-value" id="stat-total">-</span></div>
              <div class="stat">Video: <span class="stat-value" id="stat-video">-</span></div>
              <div class="stat">Audio: <span class="stat-value" id="stat-audio">-</span></div>
              <div class="stat">Size: <span class="stat-value" id="stat-size">-</span></div>
            </div>

            <div class="toolbar">
              <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="video">Video</button>
                <button class="filter-btn" data-filter="audio">Audio</button>
              </div>
              <div class="toolbar-spacer"></div>
              <input type="text" class="search-box" id="search" placeholder="Search..." />
              <button class="secondary small" id="refresh-btn">Refresh</button>
              <button class="danger small" id="delete-selected-btn" disabled>Delete selected</button>
            </div>

            <div class="select-row" id="select-row" style="display:none">
              <input type="checkbox" id="select-all" />
              <label for="select-all">Select all</label>
              <span id="selected-count" style="margin-left:auto;color:var(--accent-primary);font-weight:500"></span>
            </div>

            <div class="file-list" id="file-list">
              <div class="file-empty"><span class="spinner"></span> Loading...</div>
            </div>

            <div class="bottom-status" id="status-bar">Ready.</div>
          </div>
        </div>
      </main>
    </div>

    <script>feather.replace();</script>

    <script>
      const fileListEl = document.getElementById("file-list");
      const statusBar = document.getElementById("status-bar");
      const refreshBtn = document.getElementById("refresh-btn");
      const deleteSelectedBtn = document.getElementById("delete-selected-btn");
      const selectRow = document.getElementById("select-row");
      const selectAllCb = document.getElementById("select-all");
      const selectedCountEl = document.getElementById("selected-count");
      const searchInput = document.getElementById("search");
      const statTotal = document.getElementById("stat-total");
      const statVideo = document.getElementById("stat-video");
      const statAudio = document.getElementById("stat-audio");
      const statSize = document.getElementById("stat-size");

      let allFiles = [];
      let activeFilter = "all";
      let busy = false;

      boot();

      async function boot() {
        refreshBtn.addEventListener("click", loadLibrary);
        deleteSelectedBtn.addEventListener("click", deleteSelected);
        selectAllCb.addEventListener("change", toggleSelectAll);
        searchInput.addEventListener("input", renderFiles);

        document.querySelectorAll(".filter-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeFilter = btn.dataset.filter;
            renderFiles();
          });
        });

        await loadLibrary();
      }

      async function loadLibrary() {
        if (busy) return;
        busy = true;
        fileListEl.innerHTML = `<div class="file-empty"><span class="spinner"></span> Loading...</div>`;
        selectRow.style.display = "none";
        try {
          const data = await api("/api/library");
          allFiles = data.files || [];
          updateStats();
          renderFiles();
          setStatus("success", `${allFiles.length} file${allFiles.length !== 1 ? "s" : ""} loaded.`);
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty" style="color:var(--error)">${esc(err.message)}</div>`;
          setStatus("error", err.message);
        } finally { busy = false; }
      }

      function getFiltered() {
        const q = searchInput.value.trim().toLowerCase();
        return allFiles.filter(f => {
          if (activeFilter !== "all" && f.category !== activeFilter) return false;
          if (q && !f.name.toLowerCase().includes(q)) return false;
          return true;
        });
      }

      function renderFiles() {
        const files = getFiltered();
        fileListEl.innerHTML = "";
        selectAllCb.checked = false;
        deleteSelectedBtn.disabled = true;
        selectedCountEl.textContent = "";

        if (!files.length) {
          fileListEl.innerHTML = `<div class="file-empty">${allFiles.length ? "No matches." : "No files yet."}</div>`;
          selectRow.style.display = "none";
          return;
        }

        selectRow.style.display = "flex";
        for (const f of files) {
          const row = document.createElement("div");
          row.className = "file-row file-row-with-cb";
          const dateStr = fmtDate(f.modified);
          const ext = f.name.split(".").pop().toUpperCase();
          row.innerHTML = `
            <input type="checkbox" class="file-cb" data-path="${esc(f.path)}" />
            <div class="file-info">
              <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
              <div class="file-meta"><span>${dateStr}</span><span>${ext}</span></div>
            </div>
            <span class="file-badge ${f.category}">${f.category}</span>
            <span class="file-size">${f.size}</span>
            <button class="danger small file-del" data-path="${esc(f.path)}">Delete</button>
          `;
          row.querySelector(".file-cb").addEventListener("change", syncSelection);
          row.querySelector(".file-del").addEventListener("click", () => deleteSingle(f));
          fileListEl.appendChild(row);
        }
      }

      function toggleSelectAll() {
        const checked = selectAllCb.checked;
        fileListEl.querySelectorAll(".file-cb").forEach(cb => { cb.checked = checked; });
        syncSelection();
      }

      function syncSelection() {
        const all = fileListEl.querySelectorAll(".file-cb");
        const checked = fileListEl.querySelectorAll(".file-cb:checked");
        deleteSelectedBtn.disabled = checked.length === 0;
        selectAllCb.checked = all.length > 0 && checked.length === all.length;
        selectedCountEl.textContent = checked.length ? `${checked.length} selected` : "";
      }

      async function deleteSingle(f) {
        if (!confirm(`Delete "${f.name}"?`)) return;
        try {
          await api("/api/library", { method: "DELETE", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ path: f.path }) });
          allFiles = allFiles.filter(x => x.path !== f.path);
          updateStats(); renderFiles();
          setStatus("success", `Deleted "${f.name}".`);
        } catch (err) { setStatus("error", err.message); }
      }

      async function deleteSelected() {
        const paths = [...fileListEl.querySelectorAll(".file-cb:checked")].map(cb => cb.dataset.path);
        if (!paths.length) return;
        if (!confirm(`Delete ${paths.length} file${paths.length > 1 ? "s" : ""}?`)) return;
        busy = true; deleteSelectedBtn.disabled = true;
        let deleted = 0, lastError = "";
        for (const p of paths) {
          try {
            await api("/api/library", { method: "DELETE", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ path: p }) });
            allFiles = allFiles.filter(x => x.path !== p);
            deleted++;
          } catch (err) { lastError = err.message; }
        }
        updateStats(); renderFiles(); busy = false;
        if (lastError) setStatus("error", `${deleted}/${paths.length} deleted. ${lastError}`);
        else setStatus("success", `${deleted} file${deleted > 1 ? "s" : ""} deleted.`);
      }

      function updateStats() {
        const v = allFiles.filter(f => f.category === "video");
        const a = allFiles.filter(f => f.category === "audio");
        const bytes = allFiles.reduce((s, f) => s + f.sizeBytes, 0);
        statTotal.textContent = allFiles.length;
        statVideo.textContent = v.length;
        statAudio.textContent = a.length;
        statSize.textContent = fmtSize(bytes);
      }

      function setStatus(type, msg) {
        statusBar.innerHTML = type ? `<span class="${type}">${esc(msg)}</span>` : esc(msg);
      }

      function fmtDate(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" }) + " " +
            d.toLocaleTimeString(undefined, { hour:"2-digit", minute:"2-digit" });
        } catch { return ""; }
      }

      function fmtSize(bytes) {
        if (bytes === 0) return "0 B";
        const u = ["B","KB","MB","GB","TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + " " + u[i];
      }

      function esc(v) {
        return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      }

      async function api(url, opts = {}) {
        const r = await fetch(url, opts);
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || "Request failed.");
        return d;
      }
    </script>
  </body>
</html>
